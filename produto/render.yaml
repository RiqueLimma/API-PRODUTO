services:
  - type: web
    name: api-produto
    env: java
    buildCommand: "cd PRODUTO && ./mvnw clean package -DskipTests"
    startCommand: "cd PRODUTO && java -jar target/*.jar"
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: PORT
        value: 8080